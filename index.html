<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Sederhana</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 10px; }
        #chat-box { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; border-radius: 8px; }
        .msg { margin-bottom: 8px; padding: 5px; background: #f4f4f4; border-radius: 4px; }
        .username { font-weight: bold; color: #2c3e50; }
        input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        button { background: #3ecf8e; border: none; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Kirim Pesan</h2>
    <div id="chat-box">Memuat pesan...</div>

    <input type="text" id="username" placeholder="Nama Anda">
    <input type="text" id="content" placeholder="Tulis pesan...">
    <button onclick="sendMessage()">Kirim</button>

    <script>
        // KONFIGURASI SUPABASE
        const SUPABASE_URL = 'URL_SUPABASE_ANDA';
        const SUPABASE_KEY = 'ANON_KEY_ANDA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const chatBox = document.getElementById('chat-box');

        // Fungsi mengambil pesan
        async function fetchMessages() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: true });

            if (error) console.error('Error:', error);
            else {
                chatBox.innerHTML = data.map(m => `
                    <div class="msg">
                        <span class="username">${m.username}:</span> ${m.content}
                    </div>
                `).join('');
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // Fungsi mengirim pesan
        async function sendMessage() {
            const username = document.getElementById('username').value;
            const content = document.getElementById('content').value;

            if (!username || !content) return alert("Isi semua bidang!");

            const { error } = await supabase
                .from('messages')
                .insert([{ username, content }]);

            if (error) alert("Gagal mengirim!");
            else {
                document.getElementById('content').value = '';
                fetchMessages();
            }
        }

        // Jalankan saat pertama kali dibuka
        fetchMessages();

        // (Opsional) Refresh otomatis setiap 5 detik
        setInterval(fetchMessages, 5000);
    </script>
</body>
</html>
