<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesan Singkat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; padding: 0 1rem; line-height: 1.6; }
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2rem; }
        input, textarea, button { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #3ecf8e; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #34b27b; }
        .message-card { border-bottom: 1px solid #eee; padding: 10px 0; }
        .meta { font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

    <h2>Kirim Pesan</h2>
    <div class="input-group">
        <input type="text" id="author" placeholder="Nama Anda (opsional)">
        <textarea id="content" placeholder="Tulis pesan di sini..." required></textarea>
        <button onclick="kirimPesan()" id="btnKirim">Kirim</button>
    </div>

    <hr>

    <h3>Daftar Pesan</h3>
    <div id="pesan-container">Memuat pesan...</div>

    <script>
        // KONFIGURASI SUPABASE
        const SUPABASE_URL = 'URL_SUPABASE_ANDA';
        const SUPABASE_KEY = 'ANON_KEY_ANDA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const container = document.getElementById('pesan-container');

        // Fungsi mengambil pesan dari database
        async function ambilPesan() {
            const { data, error } = await supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                container.innerHTML = "Gagal memuat pesan.";
                return;
            }

            container.innerHTML = data.length ? '' : 'Belum ada pesan.';
            data.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message-card';
                div.innerHTML = `
                    <strong>${msg.author || 'Anonim'}</strong>: ${msg.content}
                    <div class="meta">${new Date(msg.created_at).toLocaleString('id-ID')}</div>
                `;
                container.appendChild(div);
            });
        }

        // Fungsi mengirim pesan baru
        async function kirimPesan() {
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;
            const btn = document.getElementById('btnKirim');

            if (!content) return alert("Isi pesan tidak boleh kosong!");

            btn.disabled = true;
            btn.innerText = "Mengirim...";

            const { error } = await supabase
                .from('messages')
                .insert([{ author: author || 'Anonim', content: content }]);

            if (error) {
                alert("Gagal mengirim: " + error.message);
            } else {
                document.getElementById('content').value = '';
                ambilPesan(); // Refresh daftar pesan
            }

            btn.disabled = false;
            btn.innerText = "Kirim";
        }

        // Jalankan saat halaman dibuka
        ambilPesan();
    </script>
</body>
</html>
