<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirim Pesan Supabase</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; background: #3ecf8e; border: none; color: white; border-radius: 5px; }
        .pesan-item { border-bottom: 1px solid #eee; padding: 10px 0; }
        small { color: #888; }
    </style>
</head>
<body>

    <h2>Kirim Pesan</h2>
    <input type="text" id="inputPesan" placeholder="Tulis sesuatu...">
    <button onclick="kirimPesan()">Kirim</button>

    <hr>

    <h3>Daftar Pesan</h3>
    <div id="daftarPesan">Memuat pesan...</div>

    <script>
        // KONFIGURASI SUPABASE (Ganti dengan milik Anda)
        const SUPABASE_URL = 'URL_PROJECT_ANDA';
        const SUPABASE_KEY = 'ANON_KEY_ANDA';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. FUNGSI KIRIM PESAN
        async function kirimPesan() {
            const teks = document.getElementById('inputPesan').value;
            if (!teks) return alert("Pesan tidak boleh kosong!");

            const { error } = await supabase
                .from('pesan_user')
                .insert([{ isi_pesan: teks }]);

            if (error) {
                console.error("Gagal kirim:", error);
            } else {
                document.getElementById('inputPesan').value = '';
                ambilPesan(); // Refresh daftar setelah kirim
            }
        }

        // 2. FUNGSI AMBIL & TAMPILKAN PESAN
        async function ambilPesan() {
            const { data, error } = await supabase
                .from('pesan_user')
                .select('*')
                .order('created_at', { ascending: false });

            const kontainer = document.getElementById('daftarPesan');
            
            if (error) {
                kontainer.innerHTML = "Gagal memuat data.";
                return;
            }

            kontainer.innerHTML = data.map(p => `
                <div class="pesan-item">
                    <p>${p.isi_pesan}</p>
                    <small>${new Date(p.created_at).toLocaleString('id-ID')}</small>
                </div>
            `).join('');
        }

        // Jalankan fungsi ambil data saat halaman dibuka
        ambilPesan();
    </script>
</body>
</html>
